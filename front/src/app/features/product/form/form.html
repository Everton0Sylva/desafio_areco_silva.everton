<div class="d-flex flex-column">
  <div class="page-title">
    <i class="fa-brands fa-rebel"></i>{{ id ? 'Editar' : 'Novo' }} Produto
  </div>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="row mt-3">
    <div class="form-floating mb-3 col-md-8 col-sm-12">
      <input type="text" class="form-control" id="fName" placeholder="Nome do Produto" />
      <label for="fName">Nome do Produto</label>
    </div>
    <div class="form-floating mb-3 col-md-4 col-sm-12">
      <input type="text" class="form-control" id="fPrice" placeholder="Preço" />
      <label for="fPrice">Preço</label>
    </div>
    <div class="form-floating mb-3 col-md-8 col-sm-12">
      <input type="text" class="form-control" id="fCategory" placeholder="Categoria" />
      <label for="fCategory">Categoria</label>
    </div>

    <div class="form-floating mb-3 col-md-4 col-sm-12">
      <input type="text" class="form-control" id="fQuantity" placeholder="Quantidade" />
      <label for="fQuantity">Estoque</label>
    </div>
    <div class="form-floating mb-3 col-12">
      <textarea class="form-control" id="fDescription" placeholder="Descrição"></textarea>
      <label for="fDescription">Descrição</label>
    </div>
    <div class="col-12">
      <button type="submit" [disabled]="form.invalid">Salvar</button>
    </div>
  </form>
</div>
