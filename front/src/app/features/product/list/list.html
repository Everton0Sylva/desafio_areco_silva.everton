<div class="d-flex flex-column p-3">
  <div class="col-12 d-flex flex-row justify-content-between">
    <span class="page-title"><i class="fa-solid fa-list-check"></i>Lista de Produtos</span>
    <button
      type="button"
      class="btn"
      [ngClass]="isDark() ? 'btn-dark' : 'btn-secondary'"
      routerLink="/products/new"
    >Novo
      <i class="fa-regular fa-square-plus"></i>
    </button>
  </div>
  <div class="mt-3">
    <areco-table [items]="dataList()" [columns]="columns"></areco-table>
  </div>
</div>
